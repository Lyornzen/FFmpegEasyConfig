name: Build & Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
      # Don't cancel all runners if one fails
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ffmpeg-gui/package-lock.json

      # Linux: electron-builder needs these system deps
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst-dev \
            xvfb \
            libasound2-dev \
            libsecret-1-dev

      - name: Install dependencies
        working-directory: ffmpeg-gui
        run: npm ci

      - name: Lint
        working-directory: ffmpeg-gui
        run: npm run lint

      - name: Build
        working-directory: ffmpeg-gui
        run: npm run build

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: ffmpeg-gui
        run: npm run package
        env:
          # GitHub Actions cannot sign — skip signing
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: ffmpeg-gui
        run: npm run package
        env:
          # Notarization not available on CI — skip signing
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
          APPLE_ID: ''
          APPLE_APP_SPECIFIC_PASSWORD: ''
          APPLE_TEAM_ID: ''

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: ffmpeg-gui
        run: |
          # Use xvfb for headless display (needed by some electron hooks)
          xvfb-run --auto-servernum npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-UI-${{ runner.os }}
          path: ffmpeg-gui/release/
          if-no-files-found: warn
          retention-days: 30
