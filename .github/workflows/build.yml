name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-GUI-Setup
          path: dist/*Setup*.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-GUI-Portable
          path: dist/*.exe
          if-no-files-found: ignore
